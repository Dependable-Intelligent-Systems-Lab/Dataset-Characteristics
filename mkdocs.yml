site_name: D-ACE -- Dataset Assessment and Characteristics Evaluation
site_description: Dataset Assessment and Characteristics Evaluation for dependable machine learning datasets.
site_url: https://dependable-intelligent-systems-lab.github.io/Dataset-Characteristics/
repo_name: Dependable-Intelligent-Systems-Lab/Dataset-Characteristics
repo_url: https://github.com/Dependable-Intelligent-Systems-Lab/Dataset-Characteristics
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site

theme:
  name: material
  language: en
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.select
  palette:
    - scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

nav:
  - Introduction: index.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - assets/stylesheets/extra.css

extra_javascript:
  - assets/javascripts/ai-links.js

extra:
  generator: true
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Dependable-Intelligent-Systems-Lab/Dataset-Characteristics
      name: D-ACE on GitHub

exclude_docs: |
  README.md
